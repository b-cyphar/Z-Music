name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew assembleUniversalFossRelease
      - uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: app/build/outputs/apk/universal/foss/release/
