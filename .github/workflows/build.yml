name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew assembleUniversalFossDebug -x signUniversalFossDebugApk
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/universal/foss/debug/





      
  
    
    
